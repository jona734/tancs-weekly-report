name: TANCS Weekly Report

on:
  schedule:
    # 매주 월요일 09:00 KST (UTC+9) = UTC 00:00
    - cron: "0 0 * * 1"

  # 수동 실행 버튼 (테스트용)
  workflow_dispatch:
    inputs:
      note:
        description: "수동 실행 메모 (선택)"
        required: false
        default: "수동 테스트"

jobs:
  generate-report:
    name: TANCS 주간 리포트 생성
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. 코드 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Python 환경 셋업
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          

      # 3. 패키지 설치
      - name: Install dependencies
        run: |
          pip install requests openpyxl

      # 4. 스크립트 실행
      - name: Run TANCS fetch script
        env:
          JIRA_BASE_URL:   ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL:      ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN:  ${{ secrets.JIRA_API_TOKEN }}
        run: |
          python fetch_tancs.py

      # 5. 생성된 Excel 파일을 Artifact로 업로드 (90일 보관)
      - name: Upload Excel report as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TANCS_Weekly_${{ github.run_id }}
          path: TANCS_Weekly_*.xlsx
          retention-days: 90
          if-no-files-found: error

      # 6. 실행 결과 요약 출력
      - name: Print summary
        run: |
          echo "## TANCS 주간 리포트 생성 완료" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 실행일 | $(date '+%Y-%m-%d %H:%M KST' -d '+9 hours') |" >> $GITHUB_STEP_SUMMARY
          echo "| 파일명 | TANCS_Weekly_$(date '+%Y%m%d').xlsx |" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact 보관 | 90일 |" >> $GITHUB_STEP_SUMMARY
          ls -lh TANCS_Weekly_*.xlsx >> $GITHUB_STEP_SUMMARY || true
